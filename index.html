<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blaq Wave</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #000;
      color: #fff;
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 600px;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?w=1600&q=80&fit=crop');
      background-size: cover;
      background-position: center 30%;
      z-index: 0;
    }

    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        rgba(0,0,0,0.55) 0%,
        rgba(0,0,0,0.25) 60%,
        rgba(0,0,0,0.45) 100%
      );
    }

    /* ── NAVBAR ── */
    nav {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      height: 68px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .nav-logo {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 1.05rem;
      letter-spacing: 0.12em;
      color: #fff;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    /* hamburger — hidden on desktop */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
      z-index: 30;
    }
    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: #fff;
      border-radius: 2px;
      transition: transform 0.3s, opacity 0.3s;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2.2rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.9rem;
      font-weight: 400;
      color: rgba(255,255,255,0.9);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: #fff; }

    .btn-shop {
      padding: 0.45rem 1.4rem;
      border: 2px solid #fff;
      border-radius: 999px;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 500;
      background: transparent;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }
    .btn-shop:hover { background: #fff; color: #000; }

    /* ── HERO CONTENT (bottom-left) ── */
    .hero-content {
      position: relative;
      z-index: 5;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 2.5rem 3.5rem;
    }

    .label-italic {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(1.4rem, 3.5vw, 2.4rem);
      color: rgba(255,255,255,0.92);
      line-height: 1;
      margin-bottom: 0.15rem;
    }

    .label-bold {
      font-family: 'Cormorant Garamond', serif;
      font-style: normal;
      font-weight: 700;
      font-size: clamp(3rem, 9vw, 7rem);
      color: #fff;
      line-height: 0.95;
      margin-bottom: 2rem;
      letter-spacing: -0.01em;
    }

    .hero-btns {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
   @media screen and (max-width: 900px) {
      .hero-btns {
        width: 50%;
        margin-left: 60%;
        margin-bottom: 4%;
         /* gap: 1.5rem;  */
        
        }
}
    .btn-outline {
      padding: 0.7rem 2rem;
      border: 2px solid rgba(255,255,255,0.8);
      border-radius: 999px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 400;
      background: transparent;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-outline:hover { background: rgba(255,255,255,0.12); border-color: #fff; }

    .btn-filled {
      padding: 0.7rem 2rem;
      border: 2px solid #fff;
      border-radius: 999px;
      color: #000;
      font-size: 0.95rem;
      font-weight: 500;
      background: #fff;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-filled:hover { background: rgba(255,255,255,0.85); }

    /* ── RIGHT PANEL (desktop) ── */
    .hero-right {
      position: absolute;
      right: 2.5rem;
      bottom: 3.5rem;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1.2rem;
    }

    .social-icons {
      display: flex;
      gap: 0.8rem;
      align-items: center;
    }

    .social-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      border: 1.5px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      text-decoration: none;
      color: #fff;
    }
    .social-icon:hover { background: rgba(255,255,255,0.28); border-color: rgba(255,255,255,0.6); }
    .social-icon svg { width: 18px; height: 18px; fill: #fff; }

    /* ── NEWSLETTER ── */
    .newsletter-box {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      padding: 1.4rem 1.4rem 1.2rem;
      width: 340px;
    }

    .newsletter-label {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.75);
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.4rem;
      letter-spacing: 0.01em;
    }

    .newsletter-field-label {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 0.5rem;
      letter-spacing: 0.04em;
    }

    .newsletter-row {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.12);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .newsletter-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: rgba(255,255,255,0.7);
      font-size: 0.88rem;
      padding: 0.65rem 1rem;
      font-family: 'DM Sans', sans-serif;
      min-width: 0;
    }
    .newsletter-input::placeholder { color: rgba(255,255,255,0.4); }

    .newsletter-btn {
      padding: 0.55rem 1.1rem;
      background: #fff;
      color: #000;
      font-size: 0.82rem;
      font-weight: 500;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      margin: 4px;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .newsletter-btn:hover { background: #e8e8e8; }

    /* ── SCROLL HINT ── */
    .scroll-hint {
      position: absolute;
      right: 2.5rem;
      bottom: 1.2rem;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      color: rgba(255,255,255,0.75);
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .scroll-arrow {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: bounce 1.6s ease-in-out infinite;
    }
    .scroll-arrow svg { width: 18px; height: 18px; stroke: rgba(255,255,255,0.75); fill: none; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(5px); }
    }

    /* ── COPYRIGHT ── */
    .copyright {
      position: absolute;
      left: 2.5rem;
      bottom: 1.5rem;
      z-index: 5;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.02em;
    }

    /* ── MOBILE DRAWER ── */
    .mobile-menu {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 15;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .mobile-menu.open {
      display: flex;
      opacity: 1;
      pointer-events: all;
    }
    .mobile-menu a {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: color 0.2s;
    }
    .mobile-menu a:hover { color: #fff; }
    .mobile-menu .btn-shop-mobile {
      margin-top: 0.5rem;
      padding: 0.6rem 2.2rem;
      border: 2px solid #fff;
      border-radius: 999px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      color: #fff;
      background: transparent;
      text-decoration: none;
    }

    /* ── MOBILE BOTTOM PANEL ── */
    /* On small screens, move the newsletter + socials below the headings */
    .mobile-bottom {
      display: none;
    }

    /* ════════════════════════════════════════
       RESPONSIVE BREAKPOINTS
    ════════════════════════════════════════ */

    /* Tablet (≤ 900px) */
    @media (max-width: 900px) {
      nav { padding: 0 1.5rem; }

      .nav-links { display: none; }
      .hamburger { display: flex; }

      .hero-content { padding: 0 1.5rem 10rem; }

      /* Hide desktop right panel */
      .hero-right { display: none; }
      .scroll-hint { display: none; }

      /* Show mobile bottom */
      .mobile-bottom {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 1rem;
        position: absolute;
        bottom: 2.5rem;
        left: 1.5rem;
        right: 1.5rem;
        z-index: 5;
      }

      .mobile-socials {
        display: flex;
        gap: 0.7rem;
        justify-content: flex-start;
      }

      .newsletter-box {
        width: 100%;
      }

      .copyright {
        left: 1.5rem;
        bottom: 1rem;
        font-size: 0.72rem;
      }
    }

    /* Phone (≤ 500px) */
    @media (max-width: 500px) {
      .label-italic { font-size: 1.25rem; }
      .label-bold   { font-size: clamp(2.6rem, 13vw, 3.5rem); margin-bottom: 1.4rem; }

      .hero-content { padding: 0 1.2rem 11rem; }

      .btn-outline,
      .btn-filled { padding: 0.6rem 1.5rem; font-size: 0.88rem; }

      .mobile-bottom {
        left: 1.2rem;
        right: 1.2rem;
        bottom: 2.2rem;
      }

      .social-icon { width: 38px; height: 38px; }
      .social-icon svg { width: 16px; height: 16px; }

      .newsletter-box { padding: 1rem 1rem 0.9rem; }
      .newsletter-label { font-size: 0.75rem; }

      .copyright { left: 1.2rem; }
    }
  </style>
</head>

<script>
  const hamburger = document.getElementById('hamburger');
  const mobileMenu = document.getElementById('mobileMenu');

  hamburger.addEventListener('click', () => {
    const isOpen = mobileMenu.classList.toggle('open');
    hamburger.classList.toggle('open', isOpen);
    document.body.style.overflow = isOpen ? 'hidden' : '';
  });

  function closeMenu() {
    mobileMenu.classList.remove('open');
    hamburger.classList.remove('open');
    document.body.style.overflow = '';
  }

  // Close on outside click
  mobileMenu.addEventListener('click', (e) => {
    if (e.target === mobileMenu) closeMenu();
  });
</script>
